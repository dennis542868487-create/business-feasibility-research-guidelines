name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install development dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Regenerate brand assets
        run: python scripts/build_brand_assets.py --output-dir "$RUNNER_TEMP/brand-assets"
      - name: Confirm generated asset pixels match committed files
        run: |
          python scripts/compare_brand_assets.py \
            --expected plugins/business-feasibility-research-guidelines/assets \
            --actual "$RUNNER_TEMP/brand-assets"
      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Validate repository
        run: python scripts/validate_repository.py
      - name: Build release archives
        run: python scripts/build_release_packages.py
      - uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: |
            releases/*.zip
            releases/checksums.txt
